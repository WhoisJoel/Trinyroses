<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#04060e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Ramo para una preciosota</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Italiana&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <canvas id="canvas"></canvas>

  <main class="scene">

    <div class="bouquet-wrapper">
      <div class="bouquet" id="bouquet">
        <div class="bouquet-glow"></div>
      </div>
    </div>

    <div class="message-wrap">
      <article class="message-card">

        <span class="ornament-top" aria-hidden="true">❧</span>

        <h1 class="msg-title">Trianna</h1>

        <div class="divider" aria-hidden="true">
          <span></span>
          <em class="diamond">◆</em>
          <span></span>
        </div>

        <p class="verse">
          Unas flores virtuales para ti,<br>
          por bonita y pq me gustas mucho <br>
        </p>

        <p class="verse italic">
          Alguien tan preciosota como tu se las merece<br>
          mas que nadie.
        </p>

        <div class="divider" aria-hidden="true">
          <span></span>
          <em class="diamond">◆</em>
          <span></span>
        </div>

        <p class="verse small">
          Que sepas que me encanta conocerte,<br>
          y que me encantaría seguir conociéndote más. <br>
        </p>

        <p class="signature">Con mucho cariño, Joel. &nbsp;🌼</p>

        <span class="ornament-bottom" aria-hidden="true">☙</span>

      </article>
    </div>

  </main>

  <script src="flowers.js"></script>
</body>
</html>
